<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | NFT preview card component</title>
</head>

<body>

  <main class="card">
    <div class="image-container">
      <img class="preview-image" src="images/image-equilibrium.jpg" alt="Equilibrium image">
      <div class="overlay">
        <img class="icon-view" src="images/icon-view.svg" alt="">
      </div>
    </div>
    <div class="content">
      <div class="text-container">
        <h2>Equilibrium #3429</h2>
        <p>Our Equilibrium collection promotes balance and calm.</p>
        <div class="nft-info">
          <div class="qty">
            <img src="images/icon-ethereum.svg" alt="Ethereum icon">
            <span>0.041 ETH</span>
          </div>
          <div class="deadline">
            <img src="images/icon-clock.svg" alt="Ethereum icon">
            <span>3 days left</span>
          </div>
        </div>
      </div>
      <div class="profile">
        <img src="images/image-avatar.png" alt="Avatar">
        <p>Creation of <span class="name">Jules Wyvern</span></p>
      </div>
    </div>
  </main>

</body>

</html>
